<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Calendar Embed - Example</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; }
    .demo-section { margin-bottom: 2rem; }
    .demo-section h2 { margin-bottom: 0.5rem; }
    .demo-section p { color: #666; margin-bottom: 1rem; }
    #calendar-container {
      width: 100%;
      height: 600px;
      border: 1px dashed #ccc;
      border-radius: 8px;
    }
    #page-container { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <h1>Notion Calendar Embed</h1>

  <div class="demo-section">
    <h2>Calendar mode (expandable)</h2>
    <p>Replace the URL below with your public Notion calendar view URL. The widget fills the container.</p>
    <div id="calendar-container"></div>
  </div>

  <div class="demo-section">
    <h2>Page mode</h2>
    <p>Replace the URL with any public Notion page.</p>
    <div id="page-container"></div>
  </div>

  <script type="module">
    import { createEmbed } from '../dist/index.js';

    // Replace with your public Notion URLs
    const CALENDAR_URL = 'https://www.notion.so/example/Replace-with-your-calendar-view-id?v=view-id';
    const PAGE_URL = 'https://www.notion.so/example/Replace-with-your-page-id';

    // Calendar embed (expandable) - use segments for audience-specific calendars
    // Try ?audience=premium in the URL to see segment switching
    createEmbed(
      {
        url: CALENDAR_URL,
        mode: 'calendar',
        segments: {
          default: CALENDAR_URL,
          leads: CALENDAR_URL.replace('view-id', 'leads-view-id'),
          premium: CALENDAR_URL.replace('view-id', 'premium-view-id'),
        },
        segmentFromUrl: 'audience',
      },
      document.getElementById('calendar-container')
    );

    // Page embed
    createEmbed(
      { url: PAGE_URL, mode: 'page', height: '500px' },
      document.getElementById('page-container')
    );
  </script>
</body>
</html>
